# app-manager 設定ファイル例
#
# 配置：本番では config.yml にコピーし、環境ごとに値を差し替える。
# キーが `_env` で終わる場合、値は環境変数名として解決される
# （例：session_secret_env: SESSION_SECRET）。

server:
  listen: 0.0.0.0:8180
  base_url: http://localhost:8180
  # session_secret_env: SESSION_SECRET    # PR2 以降で利用
  cookie_secure: false        # 本番 HTTPS では true。開発 HTTP では false

database:
  path: ./data/app.db
  wal: true

file_store:
  base_path: ./data/files     # 仕様 §3.2 レイアウトのルート。appmgr-server 起動時に必須
  upload_max_bytes: 20971520  # アップロード上限 (20 MiB)。0 = 既定値 20971520、負値はエラー
  allowed_mime_types:         # 未指定なら以下 3 種にフォールバック
    - application/pdf
    - image/png
    - image/jpeg

locks:
  base_dir: ./data/locks

logging:
  level: info                 # debug / info / warn / error
  base_dir: ./logs
  format: json                # json / text

auth:
  session_max_age_hours: 8    # セッション Cookie / DB の有効期間 (時間)

backup:
  output_dir: ./data/backups  # VACUUM INTO の出力先。appmgr-backup 実行時に必須
  generations: 14             # 保持世代数。0 = 無制限保持、負値はエラー

notifier:
  mode: "off"                 # smtp / teams / file / multi / off。未指定は off (appmgr-notify が no-op)
  smtp:                       # mode=smtp (または multi の channels に smtp) のとき host / from 必須
    host: smtp.example.local
    port: 25                  # 0 = 既定値 25
    from: app-manager@example.com
  teams:
    # webhook_url_env: TEAMS_WEBHOOK_URL   # teams 使用時に必須。環境変数名で指定
  file:
    output_dir: ./data/files/mail-out      # file 使用時に必須。開発・テスト用のメール出力先
  multi:
    channels: [smtp, teams]   # mode=multi のときのみ使用。smtp / teams / file から指定
  expiry_days_before: [30, 90] # ライセンス満了 N 日前通知。正整数のみ、未指定は [30, 90]
